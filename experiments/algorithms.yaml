algorithms:
  - name: RSA-2048/SHA-256
    role: baseline
    type: classical-signature
    mandatory_profile: true
    comparison_required: true
  - name: ML-DSA-65
    role: primary-pqc-candidate
    type: pqc-signature
    oqs_names:
      - ML-DSA-65
      - Dilithium3
    mandatory_profile: true
    comparison_required: true
  - name: ML-DSA-44
    role: excluded-policy-comparison
    type: pqc-signature
    oqs_names:
      - ML-DSA-44
      - Dilithium2
    mandatory_profile: false
    comparison_required: true
    exclusion_reason: NIST Category 2 is below the Category 3 floor selected for the primary suite.
  - name: ML-DSA-87
    role: high-assurance-pqc-candidate
    type: pqc-signature
    oqs_names:
      - ML-DSA-87
      - Dilithium5
    mandatory_profile: false
    comparison_required: true
  - name: SLH-DSA-SHAKE-128s
    role: diversity-pqc-candidate
    type: pqc-signature
    oqs_names:
      - SLH-DSA-SHAKE-128s
      - SPHINCS+-SHAKE-128s-simple
    mandatory_profile: false
    comparison_required: true
  - name: SLH-DSA-SHAKE-192s
    role: conservative-diversity-pqc-candidate
    type: pqc-signature
    oqs_names:
      - SLH-DSA-SHAKE-192s
      - SPHINCS+-SHAKE-192s-simple
    mandatory_profile: false
    comparison_required: true
