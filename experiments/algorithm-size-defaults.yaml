# Defaults from standards / well-known parameter sets.
# Scripts should prefer measured values when available.
algorithms:
  RSA-2048/SHA-256:
    public_key_bytes: 270
    signature_bytes: 256
    note: Rough DER/SPKI baseline placeholder. Replace with measured values.
  P-256/SHA-256:
    public_key_bytes: 65
    signature_bytes: 72
    note: Compact classical counterfactual; conservative DER signature maximum.
  Ed25519:
    public_key_bytes: 32
    signature_bytes: 64
    note: Compact classical counterfactual.
  ML-DSA-65:
    public_key_bytes: 1952
    signature_bytes: 3309
    note: FIPS 204 / RFC 9881 parameter size.
  ML-DSA-44:
    public_key_bytes: 1312
    signature_bytes: 2420
    note: FIPS 204 / RFC 9881 parameter size; measured for comparison but excluded from the primary profile by policy.
  ML-DSA-87:
    public_key_bytes: 2592
    signature_bytes: 4627
    note: FIPS 204 / RFC 9881 parameter size.
  SLH-DSA-SHAKE-128s:
    public_key_bytes: 32
    signature_bytes: 7856
    note: FIPS 205 parameter size.
  SLH-DSA-SHAKE-192s:
    public_key_bytes: 48
    signature_bytes: 16224
    note: FIPS 205 parameter size.
  RSA-2048+ML-DSA-44:
    public_key_bytes: 1582
    signature_bytes: 2676
    note: Component sum only; composite encoding overhead excluded.
  P-256+ML-DSA-44:
    public_key_bytes: 1377
    signature_bytes: 2492
    note: Component sum only; composite encoding overhead excluded.
  P-256+Falcon-512:
    public_key_bytes: 962
    signature_bytes: 738
    note: Component sum only; FN-DSA and composite profiles remain pending.
