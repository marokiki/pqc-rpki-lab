version: 1
status: experimental-not-for-production
milestones:
  - id: M1
    name: RFC-profiled PQC object generation
    priority: highest
    done_when:
      - RSA and ML-DSA-65 fixture repositories exist
      - object sizes are recorded
      - generation commands and tool versions are recorded
      - failure modes are documented if generation fails
    outputs:
      - results/object-generation-feasibility.md
      - results/generated-object-sizes.csv
      - artifacts/test-repo/metadata/object-generation.json
  - id: M2
    name: Validator interoperability
    priority: high
    depends_on: [M1]
    done_when:
      - Routinator, rpki-client, and FORT are probed
      - errors are classified
      - VRP equivalence is checked where possible
    outputs:
      - results/validator-interoperability.md
      - results/validator-capability.csv
      - results/validator-errors.json
      - results/vrp-equivalence.md
  - id: M3
    name: Real repository measurement
    priority: high
    done_when:
      - at least one local RPKI cache is summarized or absence is recorded
      - ML-DSA-65 and ML-DSA-87 projections are generated
      - RRDP snapshot and delta impact are estimated
    outputs:
      - results/real-cache-summary.csv
      - results/real-cache-projection.md
  - id: M4
    name: Transition architecture decision matrix
    priority: medium
    done_when:
      - parallel, composite, PQC-only, and Null Scheme-like approaches are compared
      - draft open issues are updated
    outputs:
      - docs/composite-and-nullscheme-decision.md
      - ietf/open-issues.md
  - id: M5
    name: Draft-01 preparation
    priority: high
    depends_on: [M1, M2, M3]
    done_when:
      - draft includes implementation status and measurement appendix
      - unsupported claims are marked accurately
      - IANA and scope boundaries are clarified
    outputs:
      - ietf/draft-yoshikawa-sidrops-pqc-rpki-01.md
      - ietf/implementation-status.md
      - ietf/interoperability-report.md
